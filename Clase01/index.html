<!-- Ejercicio práctico #1:

Crear la estructura básica del proyecto, incluyendo las etiquetas <header>, <main>, <nav> y <footer>. Dentro de <header>, incluye un título <h1> con el nombre del proyecto.

Para resolver este ejercicio, debés seguir estos pasos:
    
    1. Abrir Visual Studio Code:
        ○ Abre Visual Studio Code y creá un nuevo archivo.
        ○ Guarda el archivo con el nombre index.html.
    2. Escribir la estructura básica del documento HTML:
        ○ A continuación, debés escribir el código HTML que conformará la estructura
        básica de tu proyecto. El código debe incluir las etiquetas <header>, <nav>
    <main>, y <footer>.
    3. Guardar y visualizar en el navegador:
        ○ Guardá los cambios y abre el archivo index.html en tu navegador para ver la
        estructura básica de la página web.
-->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase 01</title>
</head>

<body>
    <header>
        <!-- Define el encabezado de una página o sección -->
        <h1>Mi Primer Proyecto</h1>
    </header>
    <nav>
        <!-- Representa sección de navegación con enlaces a otras partes de la página o a diferentes páginas -->
    </nav>
    <main>
        <!-- Contiene el contenido principal de la página -->
        <p>Este es un párrafo de introducción sobre el proyecto. Ejemplos de <strong>negrita</strong>, <em>cursiva</em> y <s>tachado</s>.</p>
    </main>
    <footer>
        <!-- Define el pie de página -->
        <p>Información de contacto: <a href="mailto:mvelazquezyarbe@gmail.com">mvelazquezyarbe@gmail.com</a></p>
    </footer>
</body>

</html>
