<!-- Ejercicio práctico #1:

Se requiere que el usuario pueda moverse por el sitio de manera intuitiva. Para eso, es necesario crear una barra de navegación usando la etiqueta <nav>.

¿Qué tenés que hacer?
    ● Crear un bloque <nav> que contenga una lista desordenada (<ul>).
    ● Dentro de esa lista, agregá elementos (<li>) con enlaces (<a>).
    ● Usá ejemplos como: "Inicio", "Productos", "Contacto".
    ● Simulá que los enlaces llevan a secciones internas del sitio.
-->

<!-- Ejercicio práctico #2:

Inserción de imagen y video

Paso a paso:

    1. Descargar y preparar los archivos:
        ○ Buscá una imagen que represente el logo de tu sitio web.
        ○ Guardala como logo.png en la misma carpeta que tu HTML.
        ○ Elegí un video representativo (video.mp4) y descargá también los subtítulos en .vtt si están disponibles (o crealos como subtitulos.vtt).
    2. Incorporar la imagen en el <header>:
        ○ Usá la etiqueta <img src="logo.png" alt="Logo de tu sitio web">.
    3. Insertar el video en el <main>:
        ○ Creá una <section> para insertar el video.
        ○ Usá la etiqueta <video> con controls.
        ○ Incluí los subtítulos usando <track src="subtitulos.vtt" kind="subtitles" srclang="es" label="Español">.
-->

<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clase 02</title>
</head>

<body>
    <header>
        <img src="img/logo.png" alt="Logo del sitio web" width="100" height="100">
    </header>
    <nav>
        <!-- Representa sección de navegación con enlaces a otras partes de la página o a diferentes páginas -->
         <ul>
            <li><a href="#inicio">Incio</a></li>
            <li><a href="#productos">Productos</a></li>
            <li><a href="#contacto">Contacto</a></li>
         </ul>
    </nav>
    <main>
        <section id="inicio">
            <h2>Inicio</h2>
        </section>
        <section id="productos">
            <h2>Productos</h2>
        </section>
        <section id="contacto">
            <h2>Contacto</h2>
        </section>
        <section>
            <video controls width="600" height="400">
                <source src="video/publicidad_farmacia.mp4" type="video/mp4">
                <track src="video/sub_publicidad_farmacia.vtt" kind="subtitles" srclang="es" label="Español">
                Tu navegador no soporta video.
            </video>
        </section>
    </main>
    <footer></footer>
</body>

</html>
